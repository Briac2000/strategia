<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>DataVerse France | Le Métavers Économique</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; }
        .ui-panel { position: absolute; z-index: 100; pointer-events: none; width: 100%; height: 100%; }
        .interactive { pointer-events: auto; }
    </style>
  </head>
  <body>

    <div class="ui-panel p-8 flex flex-col justify-between">
        <div class="flex justify-between items-start">
            <div class="bg-black/80 border-l-4 border-cyan-500 p-6 text-white backdrop-blur-md">
                <h1 class="text-2xl font-bold tracking-widest">DATAVERSE <span class="text-cyan-400 font-light">FRANCE</span></h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-[0.3em]">Visualisation Immobilière Immersive</p>
                <div class="mt-4 flex gap-4">
                    <div class="text-center"><p class="text-xs text-gray-500">INDICE TERTIAIRE</p><p class="text-xl font-bold text-green-400">104.2</p></div>
                    <div class="text-center border-l border-white/10 pl-4"><p class="text-xs text-gray-500">FLUX SIRENE</p><p class="text-xl font-bold text-cyan-400">LIVE</p></div>
                </div>
            </div>
            <div class="interactive bg-white px-6 py-3 rounded-full shadow-2xl">
                <span class="text-xs font-bold text-black italic">Session Investisseur : <span class="text-blue-600">Active</span></span>
            </div>
        </div>

        <div class="flex justify-center pb-12">
            <div class="interactive bg-black/90 p-1 rounded-xl flex gap-2 border border-white/20">
                <button onclick="window.location.href='TON_LIEN_PAYPAL_ICI'" class="bg-cyan-600 hover:bg-cyan-400 text-white px-8 py-4 rounded-lg font-bold text-sm transition-all duration-300 uppercase tracking-widest">
                    Acheter l'Analyse 3D (49€)
                </button>
            </div>
        </div>
    </div>

    <a-scene fog="type: linear; color: #000814; far: 40; near: 0">
      
      <a-sky color="#000814"></a-sky>
      
      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#020617"></a-plane>
      <a-grid position="0 0.01 0" rotation="-90 0 0" width="100" height="100" src="https://raw.githubusercontent.com/donmccurdy/aframe-extras/master/assets/grid.png" material="opacity: 0.2; transparent: true"></a-grid>

      <a-entity position="-5 0 -10">
          <a-box width="2" depth="2" height="12" color="#1e40af" material="opacity: 0.8; transparent: true">
              <a-box width="2.1" depth="2.1" height="12.1" wireframe="true" color="#fff"></a-box>
          </a-box>
          <a-text value="PARIS QCA\nLoyer: 980e" position="0 7 1.2" align="center" width="6" font="exo2bold"></a-text>
      </a-entity>

      <a-entity position="0 0 -15">
          <a-box width="2" depth="2" height="7" color="#0891b2" material="opacity: 0.8; transparent: true">
              <a-box width="2.1" depth="2.1" height="7.1" wireframe="true" color="#fff"></a-box>
          </a-box>
          <a-text value="LYON\nCroissance: +4.2%" position="0 4.5 1.2" align="center" width="6"></a-text>
      </a-entity>

      <a-entity position="6 0 -8">
          <a-box width="4" depth="4" height="3" color="#7e22ce" material="opacity: 0.8; transparent: true">
              <a-box width="4.1" depth="4.1" height="3.1" wireframe="true" color="#fff"></a-box>
          </a-box>
          <a-text value="LOGISTIQUE\nDemande Placed: +12%" position="0 2.5 2.2" align="center" width="6"></a-text>
      </a-entity>

      <a-sphere position="0 15 -25" radius="8" color="#fff" material="opacity: 0.05; transparent: true; wireframe: true" 
                animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear"></a-sphere>

      <a-light type="ambient" intensity="0.5" color="#fff"></a-light>
      <a-light type="point" intensity="2" position="2 10 -5" color="#06b2d2"></a-light>

      <a-entity id="rig" position="0 1.6 5">
        <a-camera look-controls wasd-controls></a-camera>
        <a-cursor color="#06b2d2"></a-cursor>
      </a-entity>

    </a-scene>

  </body>
</html>
