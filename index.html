<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Briac Truchon-Bartès | Atrium Numérique</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
    </style>
  </head>
  <body>

    <div style="position: absolute; top: 20px; left: 20px; z-index: 1000; pointer-events: none; width: 100%; height: 100%;" class="p-10 flex flex-col justify-between">
        <div class="flex justify-between items-start">
            <div class="bg-black/90 p-8 text-white border-l-4 border-blue-600 backdrop-blur-md">
                <h1 class="text-3xl font-bold tracking-tighter">BRIAC TRUCHON-BARTÈS</h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-[0.4em] mt-1">Stratège en Transformation Digitale & IA</p>
                <div class="mt-4 flex gap-6 text-[9px] uppercase tracking-widest text-gray-400">
                    <span>● CEO @ StrategIA</span>
                    <span>● Expert OpenData</span>
                </div>
            </div>
            <div class="p-2 border border-white/10 bg-black/50 text-white rounded-full text-xs">Session Pro</div>
        </div>

        <div class="flex justify-center pb-20 pointer-events-auto">
            <button onclick="window.location.href='https://calendly.com/briac-truchon-bartes/consultation'" class="bg-blue-600 hover:bg-white hover:text-blue-700 text-white px-10 py-5 rounded font-bold text-sm transition-all duration-300 uppercase tracking-widest shadow-[0_0_30px_rgba(37,99,235,0.4)]">
                Planifier une consultation stratégique
            </button>
        </div>
    </div>

    <a-scene fog="type: exponential; color: #f8fafc; density: 0.01">
      
      <a-sky color="#f8fafc"></a-sky>
      
      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#e2e8f0"></a-plane>
      <a-grid position="0 0.01 0" rotation="-90 0 0" width="100" height="100" src="https://raw.githubusercontent.com/donmccurdy/aframe-extras/master/assets/grid.png" material="opacity: 0.05; transparent: true"></a-grid>

      <a-cylinder position="0 5 -10" radius="15" height="10" material="opacity: 0.05; transparent: true; wireframe: true" color="#64748b"></a-cylinder>
      <a-ring position="0 0.05 -10" rotation="-90 0 0" radius-inner="14.8" radius-outer="15" color="#94a3b8"></a-ring>

      <a-entity position="-6 3 -12" rotation="0 20 0">
          <a-plane width="4" height="6" color="#0F172A" material="opacity: 0.95; transparent: true"></a-plane>
          <a-text value="PROFIL\nSTRATÉGIQUE" position="-1.5 2.5 0.1" align="left" width="5" font="exo2bold" color="#fff"></a-text>
          <a-text value="Expert en fusionnant la data et l'IA pour créer des business modèles disruptifs.\n\nVisionnaire dans le domaine de l'OpenData et de l'automatisation.\n\nCofondateur de StrategIA, le protocole d'entrepreneuriat autonome." position="-1.8 1 0.1" align="left" width="3.5" color="#cbd5e1" wrap-count="30"></a-text>
          <a-box width="4.1" height="6.1" depth="0.01" wireframe="true" color="#fff"></a-box>
      </a-entity>

      <a-entity position="0 4 -15">
          <a-plane width="7" height="4" color="#fff" material="opacity: 0.95; transparent: true"></a-plane>
          <a-text value="EXPÉRIENCE CLÉ" position="-3.2 1.5 0.1" align="left" width="8" font="exo2bold" color="#0F172A"></a-text>
          
          <a-text value="Cofondateur @ StrategIA (2025 - Présent)" position="-3.2 0.8 0.1" align="left" width="4.5" color="#334155" font="exo2bold"></a-text>
          <a-text value="Développement du protocole de création d'entreprise autonome par IA." position="-3.2 0.4 0.1" align="left" width="4.5" color="#64748b"></a-text>
          
          <a-text value="Analyse Data-Métavers (2024)" position="-3.2 -0.2 0.1" align="left" width="4.5" color="#334155" font="exo2bold"></a-text>
          <a-text value="Pionnier dans la visualisation immersive de données économiques." position="-3.2 -0.6 0.1" align="left" width="4.5" color="#64748b"></a-text>
          
          <a-box width="7.1" height="4.1" depth="0.01" wireframe="true" color="#0F172A"></a-box>
      </a-entity>

      <a-entity position="6 3 -12" rotation="0 -20 0">
          <a-plane width="4" height="6" color="#0F172A" material="opacity: 0.95; transparent: true"></a-plane>
          <a-text value="FORMATION\n& SKILLS" position="-1.5 2.5 0.1" align="left" width="5" font="exo2bold" color="#fff"></a-text>
          <a-text value="Métavers Architecture\nData Visualization\nAI Model Deployment\nBusiness Strategy 3.0" position="-1.8 0.5 0.1" align="left" width="3.5" color="#cbd5e1" wrap-count="25"></a-text>
          <a-box width="4.1" height="6.1" depth="0.01" wireframe="true" color="#fff"></a-box>
      </a-entity>

      <a-light type="ambient" intensity="0.6" color="#fff"></a-light>
      <a-light type="point" intensity="1.5" position="0 8 -5" color="#fff"></a-light>

      <a-entity id="rig" position="0 1.6 5">
        <a-camera look-controls wasd-controls></a-camera>
        <a-cursor color="#2563eb" radius-inner="0.01" radius-outer="0.02"></a-cursor>
      </a-entity>

    </a-scene>

  </body>
</html>
