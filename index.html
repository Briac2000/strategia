<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>MetaPulse | Ton Portail vers le Métavers</title>
    <meta name="description" content="Bienvenue dans le futur de l'interaction">
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>

    <div style="position: absolute; top: 20px; left: 20px; z-index: 1000; pointer-events: none;">
        <h1 class="text-white text-4xl font-black italic tracking-tighter bg-black/50 p-4 inline-block">METAPULSE <span class="text-cyan-400">0.1</span></h1>
        <p class="text-cyan-300 text-sm mt-2 font-mono bg-black/30 p-2">Utilisez Z,Q,S,D pour marcher | Souris pour regarder</p>
    </div>

    <div style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000;">
        <button onclick="window.location.href='TON_LIEN_PAYPAL_ICI'" class="bg-cyan-500 hover:bg-white hover:text-cyan-600 text-white font-bold py-4 px-10 rounded-full shadow-[0_0_20px_rgba(6,182,212,0.5)] transition duration-500 uppercase tracking-widest text-sm">
            Acheter un terrain virtuel (19€)
        </button>
    </div>

    <a-scene fog="type: exponential; color: #020617; density: 0.02">
      
      <a-sky color="#020617"></a-sky>

      <a-grid position="0 0 0" rotation="-90 0 0" width="100" height="100" src="https://cdn.rawgit.com/donmccurdy/aframe-extras/v6.0.0/dist/aframe-extras.min.js"></a-grid>
      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#0F172A"></a-plane>

      <a-box position="-5 2 -10" width="2" height="4" depth="2" color="#06B2D2" material="opacity: 0.6; transparent: true">
          <a-box position="0 0 0" width="2.1" height="4.1" depth="2.1" wireframe="true" color="#fff"></a-box>
      </a-box>

      <a-box position="5 4 -15" width="3" height="8" depth="3" color="#A855F7" material="opacity: 0.5; transparent: true">
          <a-box position="0 0 0" width="3.1" height="8.1" depth="3.1" wireframe="true" color="#fff"></a-box>
      </a-box>

      <a-box position="0 1 -5" width="1" height="2" depth="1" color="#F43F5E" material="opacity: 0.7; transparent: true">
          <a-text value="BOUTIQUE" position="-0.5 1.5 0.5" color="white" width="4"></a-text>
      </a-box>

      <a-sphere position="0 10 -20" radius="5" color="#fff" material="shader: flat" animation="property: position; dir: alternate; dur: 5000; easing: easeInOutSine; loop: true; to: 0 12 -20"></a-sphere>

      <a-entity light="type: ambient; color: #444"></a-entity>
      <a-entity light="type: point; intensity: 1.5; distance: 50; decay: 2" position="0 5 -10"></a-entity>

      <a-entity id="rig" position="0 1.6 0">
        <a-camera look-controls wasd-controls></a-camera>
      </a-entity>

    </a-scene>

  </body>
</html>
