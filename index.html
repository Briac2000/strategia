<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrategIA - Ton Business en 1 Clic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <nav class="p-6 border-b border-gray-800 flex justify-between">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-500 to-purple-600 bg-clip-text text-transparent">StrategIA</h1>
        <button class="bg-white text-black px-4 py-2 rounded-full font-bold hover:bg-gray-200 transition">Connexion</button>
    </nav>

    <main class="max-w-4xl mx-auto mt-20 text-center px-4">
        <h2 class="text-5xl md:text-7xl font-extrabold mb-6">L'IA qui crée ton business pendant que tu dors.</h2>
        <p class="text-gray-400 text-xl mb-10">Colle une idée, l'IA génère le produit, le tunnel de vente et le contenu viral.</p>
        
        <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 shadow-2xl">
            <input type="text" placeholder="Ex: Vendre des formations de Yoga pour chiens..." class="w-full p-4 rounded-lg bg-black border border-gray-700 text-white mb-4 focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="generate()" class="w-full bg-gradient-to-r from-blue-600 to-purple-700 p-4 rounded-lg font-bold text-xl hover:scale-105 transition shadow-lg shadow-blue-500/20">Lancer la machine (Gratuit)</button>
        </div>

        <div id="result" class="hidden mt-10 p-6 bg-gray-800 rounded-lg text-left animate-pulse">
            Analyse des niches en cours... Génération du plan marketing...
        </div>
    </main>

    <footer class="mt-20 py-10 border-t border-gray-900 text-gray-500 text-sm">
        Propulsé par le Protocole Autonome StrategIA 2026.
    </footer>

    <script>
        function generate() {
            const res = document.getElementById('result');
            res.classList.remove('hidden');
            setTimeout(() => {
                res.innerHTML = "<h3 class='text-green-400 font-bold'>✓ Plan de Business prêt !</h3><p class='mt-2'>Pour débloquer les 50 pages de stratégie et les scripts vidéos, passe à la version PRO (19€).</p><button class='mt-4 bg-green-500 text-white px-6 py-2 rounded font-bold'>Débloquer maintenant</button>";
                res.classList.remove('animate-pulse');
            }, 3000);
        }
    </script>
</body>
</html>
